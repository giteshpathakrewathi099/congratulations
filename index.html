<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Celebration Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-gold: #996515;
            --bg-dark: #050505;
            --bg-light: #f8f9fa;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        [data-theme="light"] {
            --bg-dark: #f0f2f5;
            --text-main: #1a1a1a;
            --text-dim: rgba(0, 0, 0, 0.6);
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        .bg-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(80px);
            animation: pulse 10s infinite alternate;
            pointer-events: none;
        }

        @keyframes pulse {
            from { transform: translate(-10%, -10%) scale(1); opacity: 0.3; }
            to { transform: translate(10%, 10%) scale(1.3); opacity: 0.6; }
        }

        .celebration-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .celebration-container {
            width: 100%;
            max-width: 600px;
            padding: 3.5rem 2.5rem;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.2);
            animation: reveal 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user-image-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--primary-gold), var(--dark-gold));
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            display: none;
        }

        .user-image-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--card-bg);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, var(--text-main) 30%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-style: italic;
            line-height: 1.1;
        }

        .recipient-name {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            display: block;
        }

        .celebration-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .action-btn {
            background: var(--primary-gold);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        .action-btn.secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        /* Generator Section */
        #generator {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 100;
            display: none;
            overflow-y: auto;
            padding: 2rem;
        }

        .gen-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary-gold);
        }

        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 600px) {
            .celebration-container { padding: 2.5rem 1.5rem; border-radius: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; border: none; }
            h1 { font-size: 2.5rem; }
            .gen-container { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">
        <svg id="sunIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="moonIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div id="generator">
        <div class="gen-container">
            <h2 style="margin-bottom: 1.5rem; font-family: 'Playfair Display'; font-size: 2rem; color: var(--primary-gold); text-align: center;">Create Your Card</h2>
            
            <div class="input-group">
                <label>Recipient Name</label>
                <input type="text" id="nameInput" placeholder="e.g. Dilip Sir">
            </div>

            <div class="input-group">
                <label>Message Type</label>
                <select id="typeInput">
                    <option value="Congratulations">Congratulations</option>
                    <option value="Happy Birthday">Happy Birthday</option>
                    <option value="Best Wishes">Best Wishes</option>
                    <option value="Thank You">Thank You</option>
                </select>
            </div>

            <div class="input-group">
                <label>Image URL (Optional)</label>
                <input type="text" id="imgInput" placeholder="https://example.com/photo.jpg">
            </div>

            <div class="input-group">
                <label>Custom Description</label>
                <textarea id="descInput" rows="3" placeholder="Write a heartfelt message..."></textarea>
            </div>

            <div class="input-group">
                <label>Theme Preference</label>
                <select id="themeInput">
                    <option value="dark">Dark Theme</option>
                    <option value="light">Light Theme</option>
                </select>
            </div>

            <button class="action-btn" style="width: 100%; justify-content: center; margin-top: 1rem;" onclick="generateLink()">Generate & Copy Link</button>
            <p id="copyStatus" style="margin-top: 1rem; font-size: 0.8rem; color: #4ade80; opacity: 0; transition: 0.3s; text-align: center;"></p>
        </div>
    </div>

    <main class="celebration-wrapper" id="mainContent">
        <div class="celebration-container">
            <div class="user-image-container" id="userImgContainer">
                <img src="" alt="User Image" id="userImg">
            </div>

            <h1 id="cardHeading">Congratulations</h1>
            <span class="recipient-name" id="userName">Our Valued Member</span>
            
            <p class="celebration-text" id="cardDesc">A remarkable achievement. Your journey has been nothing short of inspiring. Thank you for your unwavering commitment and excellence.</p>

            <div class="btn-group">
                <button class="action-btn" onclick="celebrateAgain()">
                    <span>Celebrate</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4Z"></path></svg>
                </button>
                <button class="action-btn secondary" onclick="location.href='index.html'">
                    <span>New Card</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const type = urlParams.get('type') || 'Congratulations';
        const desc = urlParams.get('desc');
        const img = urlParams.get('img');
        const theme = urlParams.get('theme') || 'dark';

        // Apply Theme
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            const sun = document.getElementById('sunIcon');
            const moon = document.getElementById('moonIcon');
            if (t === 'light') {
                sun.style.display = 'block';
                moon.style.display = 'none';
            } else {
                sun.style.display = 'none';
                moon.style.display = 'block';
            }
        }
        applyTheme(theme);

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            applyTheme(next);
        }

        if (!name) {
            document.getElementById('generator').style.display = 'block';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('themeBtn').style.display = 'none';
        } else {
            document.getElementById('userName').textContent = name;
            document.getElementById('cardHeading').textContent = type;
            if (desc) document.getElementById('cardDesc').textContent = desc;
            if (img) {
                document.getElementById('userImg').src = img;
                document.getElementById('userImgContainer').style.display = 'block';
            }
        }

        function generateLink() {
            const iName = document.getElementById('nameInput').value;
            const iType = document.getElementById('typeInput').value;
            const iImg = document.getElementById('imgInput').value;
            const iDesc = document.getElementById('descInput').value;
            const iTheme = document.getElementById('themeInput').value;

            if (!iName) {
                alert("Please enter a name");
                return;
            }
            
            const baseUrl = window.location.href.split('?')[0];
            const params = new URLSearchParams();
            params.set('name', iName);
            params.set('type', iType);
            if (iImg) params.set('img', iImg);
            if (iDesc) params.set('desc', iDesc);
            params.set('theme', iTheme);

            const fullUrl = `${baseUrl}?${params.toString()}`;
            
            navigator.clipboard.writeText(fullUrl).then(() => {
                const status = document.getElementById('copyStatus');
                status.textContent = "Link copied! Redirecting...";
                status.style.opacity = '1';
                setTimeout(() => {
                    window.location.href = fullUrl;
                }, 1200);
            });
        }

        function celebrateAgain() {
            const end = Date.now() + (2 * 1000);
            const colors = ['#d4af37', '#ffffff', '#996515'];

            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        window.addEventListener('load', () => {
            if (name) {
                setTimeout(() => {
                    confetti({
                        particleCount: 150,
                        spread: 100,
                        origin: { y: 0.6 },
                        colors: ['#d4af37', '#ffffff', '#996515']
                    });
                }, 500);
            }
        });
    </script>
</body>
</html>
