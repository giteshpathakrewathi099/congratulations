<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gp Card's</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./assets/image/favicon.ico">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>

<body>
<a href="./hello.html" style="color: #fff;">ANIMATION ONLY</a>
    <div class="controls-container" style="display: none;">
        <div class="theme-switcher-group" id="themeSwitcher">
            <button class="theme-switch-btn" data-theme="light" aria-label="Light theme">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
            </button>
            <button class="theme-switch-btn" data-theme="system" aria-label="System theme">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="12" rx="2" />
                    <line x1="2" y1="20" x2="22" y2="20" />
                </svg>
            </button>
            <button class="theme-switch-btn" data-theme="dark" aria-label="Dark theme">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </div>
    </div>

    <div class="gen-container" style="display: none;" data-aos="fade-up" data-aos-duration="2500">
        <h2>Create Your Card</h2>

        <div class="input-group">
            <label>Recipient Name</label>
            <input type="text" id="nameInput" placeholder="e.g. Raj Sir">
        </div>

        <div class="input-group">
            <label>Message Type</label>
            <select id="typeInput">
                <option value="Congratulations">Congratulations</option>
                <option value="Happy Birthday">Happy Birthday</option>
                <option value="Birthday Soon">Birthday Soon</option>
                <option value="Best Wishes">Best Wishes</option>
                <option value="Thank You">Thank You</option>
                <option value="Happy Wedding Anniversary">Happy Wedding Anniversary</option>
            </select>
        </div>

        <div class="input-group">
            <label>Image (URL or Upload)</label>
            <div class="combined-input">
                <input type="text" id="imgInput" placeholder="Paste URL or click upload ">
                <label for="fileInput" class="upload-icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </label>
            </div>
            <small id="fileNameDisplay"
                style="display: none; margin-top: 8px; color: var(--primary-gold); font-weight: 600;"></small>
        </div>

        <div class="input-group">
            <label>Custom Description (Optional)</label>
            <textarea id="descInput" rows="3" placeholder="Write a heartfelt message..."></textarea>
        </div>

        <div class="input-group">
            <label>Default Theme</label>
            <select id="themeInput">
                <option value="dark">Dark Theme</option>
                <option value="light">Light Theme</option>
            </select>
        </div>

        <div class="input-group">
            <label>Background Music</label>
            <select id="musicInput">
                <option value="none">No Music</option>
                <option value="birthday">Birthday Celebration</option>
                <option value="wedding">Romantic Wedding</option>
                <option value="congrats">Grand Celebration</option>
                <option value="thankyou">Soft Gratitude</option>
                <option value="wishes">Best Wishes Melody</option>
                <option value="romantic">Romantic Melody</option>
            </select>
        </div>

        <button class="action-btn" onclick="generateLink()">Generate Card</button>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
