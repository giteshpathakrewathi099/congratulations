<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Celebration Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="gen-container">
        <h2>Create Your Card</h2>
        
        <div class="input-group">
            <label>Recipient Name</label>
            <input type="text" id="nameInput" placeholder="e.g. Raj Sir">
        </div>

        <div class="input-group">
            <label>Message Type</label>
            <select id="typeInput">
                <option value="Congratulations">Congratulations</option>
                <option value="Happy Birthday">Happy Birthday</option>
                <option value="Best Wishes">Best Wishes</option>
                <option value="Thank You">Thank You</option>
            </select>
        </div>

        <div class="input-group">
            <label>Image URL (Optional)</label>
            <input type="text" id="imgInput" placeholder="https://example.com/photo.jpg">
        </div>

        <div class="input-group">
            <label>OR Upload Image</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="input-group">
            <label>Custom Description (Optional)</label>
            <textarea id="descInput" rows="3" placeholder="Write a heartfelt message..."></textarea>
        </div>

        <div class="input-group">
            <label>Theme Preference</label>
            <select id="themeInput">
                <option value="dark">Dark Theme</option>
                <option value="light">Light Theme</option>
            </select>
        </div>

        <button class="action-btn" onclick="generateLink()">Generate Card</button>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
